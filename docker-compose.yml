version: '3.8'
services:
  postgres-db:
    image: postgres:15-alpine
    container_name: finance_postgres
    environment:
      POSTGRES_USER: finance_admin
      POSTGRES_PASSWORD: securepassword
      POSTGRES_DB: finance_dashboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend-api:
    build: .
    container_name: finance_backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres-db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/finance_dashboard

volumes:
  postgres_data: