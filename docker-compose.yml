version: '3.8'
services:
  postgres-db:
    image: postgres:15-alpine
    container_name: finance_postgres
    environment:
      POSTGRES_USER: finance_admin
      POSTGRES_PASSWORD: securepassword
      POSTGRES_DB: finance_dashboard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: